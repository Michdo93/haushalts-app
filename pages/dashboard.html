<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard – HaushaltApp</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<nav class="topnav">
  <a class="topnav-brand" href="../index.html">💰 HAUSHALTS<em>APP</em></a>
  <a href="dashboard.html" class="active">📊 Dashboard</a>
  <a href="transaktionen.html">📋 Transaktionen</a>
  <a href="kategorien.html">🏷 Kategorien</a>
  <div id="nav-user"><span></span><button id="btn-logout">Abmelden</button></div>
</nav>
<div class="container">
  <h1 class="page-title">📊 <em>Dashboard</em></h1>
  <p class="page-sub">Übersicht deiner Finanzen</p>

  <!-- Monatsauswahl -->
  <div class="card" style="padding:1rem 1.4rem;margin-bottom:1rem">
    <div style="display:flex;align-items:center;gap:.85rem;flex-wrap:wrap">
      <div class="field" style="margin:0;flex:0">
        <label style="margin-bottom:.3rem;display:block">Monat</label>
        <input type="month" id="month-sel" style="width:160px" onchange="loadMonth()">
      </div>
      <button class="btn btn-outline btn-sm" onclick="prevMonth()">‹ Vormonat</button>
      <button class="btn btn-outline btn-sm" onclick="nextMonth()">Nächster ›</button>
      <button class="btn btn-sm" onclick="openAddTx()" style="margin-left:auto">+ Transaktion</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">💚 Einnahmen</div>
      <div class="stat-val amount-inc" id="stat-inc">–</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">🔴 Ausgaben</div>
      <div class="stat-val amount-exp" id="stat-exp">–</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">⚖️ Saldo</div>
      <div class="stat-val" id="stat-bal">–</div>
    </div>
  </div>

  <!-- Charts: Ausgaben nach Kategorie -->
  <div class="card">
    <div class="card-title">📊 Ausgaben nach Kategorie</div>
    <div id="cat-chart" class="bar-wrap"></div>
  </div>

  <!-- Letzte Transaktionen -->
  <div class="card">
    <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
      <span>🕐 Letzte Transaktionen</span>
      <a href="transaktionen.html" style="font-size:.78rem;color:var(--green);text-decoration:none">Alle →</a>
    </div>
    <div id="tx-list" class="tx-list"></div>
  </div>

  <!-- Monatsverlauf -->
  <div class="card">
    <div class="card-title">📅 Monatsverlauf</div>
    <div id="monthly-summary" class="bar-wrap"></div>
  </div>
</div>

<!-- Add Transaction Modal -->
<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title">
      <span id="modal-title-text">+ Transaktion</span>
      <button class="btn-ghost" onclick="closeModal()" style="font-size:1.2rem">✕</button>
    </div>
    <div id="modal-alert" class="alert alert-red" style="display:none"></div>

    <div class="tabs">
      <button class="tab active" id="tab-exp" onclick="setTxType('expense')">📤 Ausgabe</button>
      <button class="tab" id="tab-inc" onclick="setTxType('income')">📥 Einnahme</button>
    </div>

    <div class="row-2">
      <div class="field"><label>Betrag (€)</label><input type="number" id="tx-amount" placeholder="0.00" step="0.01" min="0.01"></div>
      <div class="field"><label>Datum</label><input type="date" id="tx-date"></div>
    </div>
    <div class="field"><label>Beschreibung</label><input type="text" id="tx-desc" placeholder="z.B. Wocheneinkauf"></div>
    <div class="field"><label>Kategorie</label><select id="tx-cat"><option value="">– keine –</option></select></div>
    <div class="field"><label>Notiz (optional)</label><textarea id="tx-note" rows="2" placeholder=""></textarea></div>

    <div class="btns" style="margin-top:.5rem">
      <button class="btn" id="btn-save-tx" onclick="saveTx()">Speichern</button>
      <button class="btn btn-outline" onclick="closeModal()">Abbrechen</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/nav.js"></script>
<script>
requireAuth();

const fmtE = n => n.toLocaleString('de-DE', {style:'currency', currency:'EUR'});
let cats = [], txType = 'expense', editId = null;

async function init() {
  const today = new Date().toISOString().slice(0,7);
  document.getElementById('month-sel').value = today;
  document.getElementById('tx-date').value   = new Date().toISOString().slice(0,10);
  cats = await api.getCategories();
  await loadMonth();
  loadSummary();
}

async function loadMonth() {
  const m = document.getElementById('month-sel').value;
  const txs = await api.getTransactions({month: m});
  renderStats(txs);
  renderCatChart(txs);
  renderTxList(txs.slice(0,8));
}

function renderStats(txs) {
  let inc=0, exp=0;
  txs.forEach(t => t.type==='income' ? inc+=t.amount : exp+=t.amount);
  const bal = inc-exp;
  document.getElementById('stat-inc').textContent = fmtE(inc);
  document.getElementById('stat-exp').textContent = fmtE(exp);
  const el = document.getElementById('stat-bal');
  el.textContent = fmtE(bal);
  el.className = 'stat-val ' + (bal>=0 ? 'amount-inc' : 'amount-exp');
}

function renderCatChart(txs) {
  const expenses = txs.filter(t => t.type==='expense');
  const bycat = {};
  expenses.forEach(t => {
    const key = t.category ? t.category.icon+' '+t.category.name : '📦 Sonstige';
    bycat[key] = (bycat[key]||0) + t.amount;
  });
  const total = Object.values(bycat).reduce((a,b)=>a+b,0)||1;
  const sorted = Object.entries(bycat).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const el = document.getElementById('cat-chart');
  if (!sorted.length) { el.innerHTML='<div class="empty"><div class="icon">📊</div>Keine Ausgaben in diesem Monat</div>'; return; }
  el.innerHTML = sorted.map(([label,val]) =>
    `<div class="bar-row">
      <div class="bar-label" title="${label}">${label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${val/total*100}%;background:var(--red)"></div></div>
      <div class="bar-val amount-exp">${fmtE(val)}</div>
    </div>`
  ).join('');
}

function renderTxList(txs) {
  const el = document.getElementById('tx-list');
  if (!txs.length) { el.innerHTML='<div class="empty"><div class="icon">📭</div>Keine Transaktionen</div>'; return; }
  el.innerHTML = txs.map(t => {
    const icon = t.category ? t.category.icon : (t.type==='income'?'💰':'📦');
    const cat  = t.category ? t.category.name : '–';
    const sign = t.type==='income' ? '+' : '−';
    const cls  = t.type==='income' ? 'amount-inc' : 'amount-exp';
    return `<div class="tx-item">
      <div class="tx-icon">${icon}</div>
      <div class="tx-info">
        <div class="tx-desc">${t.description||'–'}</div>
        <div class="tx-meta">
          <span>${t.date}</span>
          <span class="badge ${t.type==='income'?'badge-inc':'badge-exp'}">${cat}</span>
        </div>
      </div>
      <div class="tx-amount ${cls}">${sign}${fmtE(t.amount)}</div>
    </div>`;
  }).join('');
}

async function loadSummary() {
  const summary = await api.getSummary().catch(()=>[]);
  const el = document.getElementById('monthly-summary');
  if (!summary.length) { el.innerHTML='<div class="empty" style="padding:1.5rem">Noch keine Daten</div>'; return; }
  const maxInc = Math.max(...summary.map(s=>s.total_income),1);
  const maxExp = Math.max(...summary.map(s=>s.total_expense),1);
  el.innerHTML = summary.slice(0,6).map(s =>
    `<div style="margin-bottom:.85rem">
      <div style="font-size:.75rem;color:var(--muted);margin-bottom:.35rem;font-weight:600">${s.month}</div>
      <div class="bar-row" style="margin-bottom:.25rem">
        <div class="bar-label">Einnahmen</div>
        <div class="bar-track"><div class="bar-fill" style="width:${s.total_income/maxInc*100}%;background:var(--green)"></div></div>
        <div class="bar-val amount-inc">${fmtE(s.total_income)}</div>
      </div>
      <div class="bar-row">
        <div class="bar-label">Ausgaben</div>
        <div class="bar-track"><div class="bar-fill" style="width:${s.total_expense/maxExp*100}%;background:var(--red)"></div></div>
        <div class="bar-val amount-exp">${fmtE(s.total_expense)}</div>
      </div>
    </div>`
  ).join('');
}

// --- Modal ---
let currentTxType = 'expense';
function setTxType(t) {
  currentTxType = t;
  document.getElementById('tab-exp').classList.toggle('active', t==='expense');
  document.getElementById('tab-inc').classList.toggle('active', t==='income');
  fillCatSelect(t);
}

function fillCatSelect(type) {
  const sel = document.getElementById('tx-cat');
  const filtered = cats.filter(c => c.type === type);
  sel.innerHTML = '<option value="">– keine –</option>' +
    filtered.map(c => `<option value="${c.id}">${c.icon} ${c.name}</option>`).join('');
}

function openAddTx() {
  editId = null;
  document.getElementById('modal-title-text').textContent = '+ Neue Transaktion';
  document.getElementById('tx-amount').value = '';
  document.getElementById('tx-desc').value   = '';
  document.getElementById('tx-note').value   = '';
  document.getElementById('tx-date').value   = new Date().toISOString().slice(0,10);
  document.getElementById('modal-alert').style.display = 'none';
  setTxType('expense');
  document.getElementById('modal').style.display = 'flex';
}
function closeModal() { document.getElementById('modal').style.display = 'none'; }

async function saveTx() {
  const btn = document.getElementById('btn-save-tx');
  const malert = document.getElementById('modal-alert');
  const amount = parseFloat(document.getElementById('tx-amount').value);
  const desc   = document.getElementById('tx-desc').value.trim();
  const date   = document.getElementById('tx-date').value;
  const cat_id = parseInt(document.getElementById('tx-cat').value)||null;
  const note   = document.getElementById('tx-note').value.trim();
  if (!amount || !date) { malert.textContent='Betrag und Datum angeben'; malert.style.display='block'; return; }
  malert.style.display='none';
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>';
  try {
    const data = {amount, type:currentTxType, description:desc, note, date, category_id:cat_id};
    if (editId) await api.updateTransaction(editId, data);
    else        await api.createTransaction(data);
    closeModal();
    await loadMonth();
    await loadSummary();
  } catch(e) {
    malert.textContent=e.message; malert.style.display='block';
  } finally {
    btn.disabled=false; btn.innerHTML='Speichern';
  }
}

function prevMonth() {
  const [y,m] = document.getElementById('month-sel').value.split('-').map(Number);
  const d = new Date(y,m-2,1);
  document.getElementById('month-sel').value = d.toISOString().slice(0,7);
  loadMonth();
}
function nextMonth() {
  const [y,m] = document.getElementById('month-sel').value.split('-').map(Number);
  const d = new Date(y,m,1);
  document.getElementById('month-sel').value = d.toISOString().slice(0,7);
  loadMonth();
}

init();
</script>
</body></html>
